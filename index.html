<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Canteen - Methodist Lubuk Pakam</title>
<!-- Font Gendut: Fredoka One -->
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

:root {
  --bg: #fffaf0; --fg: #2d2d2d; --muted: #666; 
  --primary: #ff4757; --primary-glow: rgba(255, 71, 87, 0.6);
  --secondary: #ffa502; --secondary-glow: rgba(255, 165, 2, 0.6);
  --tertiary: #ff6348; --tertiary-glow: rgba(255, 99, 72, 0.6);
  --accent: #ff3f34;
  --success: #2ed573; --danger: #ff4757; --info: #45aaf2;
  --card: rgba(255, 255, 255, 0.95); --border: rgba(255, 255, 255, 0.6);
  --shadow: 0 10px 30px rgba(255, 71, 87, 0.15);
  --title-fill: #ffa502;      /* Orange Terang */
  --title-stroke: #ffffff;    /* Putih */
  --title-shadow: #d35400;    /* Orange Tua */
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg);
  min-height: 100vh; overflow-x: hidden; position: relative;
}

/* Background Pattern */
.bg-pattern {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background-color: var(--bg);
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(255, 165, 2, 0.1) 0%, transparent 20%),
    radial-gradient(circle at 90% 80%, rgba(255, 71, 87, 0.1) 0%, transparent 20%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ff4757' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

.bg-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
.shape { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: float 25s ease-in-out infinite; }
.shape-1 { width: 600px; height: 600px; background: #ffd32a; top: -200px; left: -100px; }
.shape-2 { width: 500px; height: 500px; background: #ff6b6b; bottom: -150px; right: -100px; animation-delay: -5s; }

@keyframes float { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(30px, -30px) rotate(10deg); } }

.container { max-width: 960px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
.hidden { display: none !important; }

/* ================= FONT JUDUL GENDUT ================= */
.text-title-style {
  font-family: 'Fredoka One', cursive;
  color: var(--title-fill);
  -webkit-text-stroke: 2.5px var(--title-stroke);
  paint-order: stroke fill;
  text-shadow: 3px 3px 0px var(--title-shadow);
  letter-spacing: 1px;
}

/* Toast */
.toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
.toast { background: white; padding: 16px 24px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; color: var(--fg); animation: slideDown 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); border-left: 5px solid var(--success); min-width: 250px; }
.toast-success { background: var(--success); color: white; }
.toast-warning { background: var(--secondary); color: white; }
.toast-error { background: var(--danger); color: white; }
.toast-info { background: var(--info); color: white; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

/* Auth Pages */
#loginPage { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
.auth-card {
  background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); width: 100%; max-width: 420px; border-radius: 30px;
  box-shadow: 0 20px 50px rgba(255, 71, 87, 0.15); border: 1px solid rgba(255, 255, 255, 0.8); overflow: hidden; animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative;
}
.auth-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--primary), var(--secondary), var(--tertiary)); box-shadow: 0 0 15px var(--primary-glow); }
@keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

.auth-header { text-align: center; padding: 40px 20px 20px; }
.auth-header h1 { font-size: 36px; margin-bottom: 5px; font-family: 'Fredoka One', cursive; color: var(--title-fill); -webkit-text-stroke: 2px var(--title-stroke); paint-order: stroke fill; text-shadow: 3px 3px 0px var(--title-shadow); }
.auth-header p { color: var(--muted); font-size: 14px; font-weight: 600; }

.auth-tabs { display: flex; background: rgba(0,0,0,0.03); margin: 0 20px; border-radius: 20px; padding: 4px; }
.tab-btn { flex: 1; padding: 12px; text-align: center; border: none; background: transparent; color: var(--muted); font-weight: 700; font-size: 15px; cursor: pointer; border-radius: 16px; transition: all 0.3s ease; }
.tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(255, 71, 87, 0.15); }

.auth-form { padding: 25px; }
.input-group { margin-bottom: 15px; position: relative; }
.input-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: var(--fg); }
.input-group input, .input-group select { width: 100%; padding: 14px 18px; border-radius: 16px; border: 2px solid rgba(255, 71, 87, 0.1); background: white; font-size: 15px; transition: all 0.3s; }
.input-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255, 71, 87, 0.1), 0 0 15px rgba(255, 71, 87, 0.1); }

.btn-main { width: 100%; padding: 16px; border: none; border-radius: 16px; background: linear-gradient(135deg, var(--primary), var(--tertiary)); color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3); }
.btn-main:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(255, 71, 87, 0.4); }
.btn-admin-trigger { display: block; width: 100%; margin-top: 15px; background: transparent; border: 2px dashed rgba(255, 71, 87, 0.2); padding: 12px; border-radius: 16px; color: var(--muted); font-weight: 600; cursor: pointer; transition: all 0.3s; }
.btn-admin-trigger:hover { border-color: var(--primary); color: var(--primary); background: rgba(255, 71, 87, 0.05); }

/* Navigation Bar */
.nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); padding: 8px 12px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; gap: 5px; z-index: 1000; border: 1px solid rgba(255,255,255,0.8); }
.nav-item { display: flex; flex-direction: column; align-items: center; padding: 8px 15px; border-radius: 20px; text-decoration: none; transition: all 0.3s; cursor: pointer; border: none; background: transparent; color: var(--muted); position: relative; }
.nav-item.active { background: linear-gradient(135deg, var(--primary), var(--tertiary)); color: white; box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3); }
.nav-item svg { width: 22px; height: 22px; margin-bottom: 2px; }
.nav-item span { font-size: 11px; font-weight: 700; }
.nav-notif { position: absolute; top: 0; right: 5px; width: 18px; height: 18px; background: var(--secondary); color: white; font-size: 10px; font-weight: 800; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 0 10px var(--secondary-glow); }

/* App Header */
.app-header { text-align: center; margin-bottom: 25px; padding-top: 20px; }
.app-title { font-size: 32px; letter-spacing: 1px; margin-bottom: 0; font-family: 'Fredoka One', cursive; color: var(--title-fill); -webkit-text-stroke: 2.5px var(--title-stroke); paint-order: stroke fill; text-shadow: 3px 3px 0px var(--title-shadow); }
.app-subtitle { color: var(--muted); font-size: 14px; font-weight: 600; margin-top: 5px; }

.profile-bar { background: rgba(255, 255, 255, 0.9); padding: 15px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.5); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
.profile-bar:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
.profile-info h4 { font-weight: 700; color: var(--fg); }
.profile-info p { font-size: 12px; color: var(--muted); }
.profile-badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; background: linear-gradient(135deg, var(--secondary), var(--tertiary)); box-shadow: 0 4px 10px var(--secondary-glow); }

/* Grid & Menu */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
.menu-card { background: var(--card); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.5); transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; position: relative; }
.menu-card:hover { transform: translateY(-5px) rotate(1deg); box-shadow: 0 15px 35px rgba(255, 71, 87, 0.2); }
.menu-img { width: 100%; height: 120px; object-fit: cover; }
.menu-body { padding: 12px; text-align: center; }
.menu-name { font-size: 14px; font-weight: 700; color: var(--fg); margin-bottom: 4px; }
.menu-price { font-size: 14px; font-weight: 800; background: linear-gradient(45deg, var(--primary), var(--tertiary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
/* Rating Styles */
.menu-rating { font-size: 14px; margin-top: 4px; display: flex; justify-content: center; gap: 1px; }
.star-filled { color: var(--secondary); }
.star-empty { color: #e5e7eb; }
.rating-text { font-size: 10px; color: var(--muted); margin-left: 4px; font-weight: 700; align-self: center; }

.menu-badge { position: absolute; top: 10px; right: 10px; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; color: white; }
.badge-available { background: var(--success); box-shadow: 0 0 10px rgba(46, 213, 115, 0.4); }
.badge-unavailable { background: #718093; }

/* Order Cards */
.order-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--info); }
.order-card.status-pending { border-left-color: var(--secondary); }
.order-card.status-processing { border-left-color: var(--tertiary); }
.order-card.status-ready { border-left-color: var(--success); box-shadow: 0 5px 20px rgba(46, 213, 115, 0.2); }
.order-card.status-completed { border-left-color: #ccc; opacity: 0.7; }
.status-chip { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
.chip-pending { background: #fff4e6; color: #e67700; }
.chip-processing { background: #fff0e6; color: #d9480f; }
.chip-ready { background: #d3f9d8; color: #2b8a3e; }
.chip-completed { background: #e9ecef; color: #495057; }
.chip-cancelled { background: #ffe3e3; color: #c92a2a; }

.btn-action-sm { padding: 6px 12px; border-radius: 10px; border: none; font-weight: 600; font-size: 12px; cursor: pointer; margin-top: 5px; margin-left: 5px; transition: all 0.2s; }
.btn-accept { background: var(--success); color: white; box-shadow: 0 4px 10px rgba(46, 213, 115, 0.3); }
.btn-cancel { background: var(--danger); color: white; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3); }
.btn-process { background: var(--secondary); color: white; }
.btn-ready { background: var(--success); color: white; }

/* Cart FAB */
.cart-fab { position: fixed; top: 20px; right: 20px; width: 60px; height: 60px; background: linear-gradient(135deg, var(--secondary), var(--tertiary)); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px var(--secondary-glow); cursor: pointer; z-index: 1000; border: none; transition: transform 0.2s; }
.cart-fab:hover { transform: scale(1.1) rotate(10deg); }
.cart-count { position: absolute; top: -5px; right: -5px; width: 22px; height: 22px; background: white; color: var(--primary); border-radius: 50%; font-weight: 800; font-size: 12px; border: 2px solid white; display: flex; align-items: center; justify-content: center; }

/* Modal */
.modal { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.modal-content { background: white; width: 100%; max-width: 400px; border-radius: 24px; padding: 24px; animation: slideUp 0.3s ease; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.8); position: relative; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }
.btn-close { position: absolute; top: 15px; right: 15px; background: #f3f4f6; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; z-index: 10; }

/* Sub Navigation */
.sub-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
.sub-nav button { padding: 8px 20px; border-radius: 20px; border: none; background: white; color: var(--muted); font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
.sub-nav button.active { background: linear-gradient(135deg, var(--primary), var(--tertiary)); color: white; box-shadow: 0 5px 15px rgba(255, 71, 87, 0.2); }

/* Admin Tabs */
.admin-tabs { display: flex; background: white; border-radius: 20px; padding: 5px; margin-bottom: 20px; box-shadow: var(--shadow); }
.admin-tab-btn { flex: 1; padding: 12px; border-radius: 16px; border: none; background: transparent; font-weight: 700; color: var(--muted); cursor: pointer; transition: all 0.3s; }
.admin-tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px var(--primary-glow); }

/* Rating Stars Input */
.rating-stars { display: flex; justify-content: center; gap: 5px; margin: 20px 0; flex-direction: row-reverse; }
.rating-stars input { display: none; }
.rating-stars label { font-size: 30px; color: #ddd; cursor: pointer; transition: all 0.2s; }
.rating-stars label:hover, .rating-stars label:hover ~ label, .rating-stars input:checked ~ label { color: var(--secondary); text-shadow: 0 0 10px var(--secondary-glow); }

/* Admin Menu Item Style (New) */
.admin-menu-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 15px; border-radius: 16px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); transition: opacity 0.3s; }
.admin-menu-item.unavailable-dim { opacity: 0.5; background: #f8f8f8; filter: grayscale(100%); }

footer { text-align: center; padding: 20px; color: var(--muted); font-size: 12px; }

@media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }

</style>
</head>
<body>

<div class="bg-pattern"></div>
<div class="bg-shapes"><div class="shape shape-1"></div><div class="shape shape-2"></div></div>
<div class="toast-container" id="toastContainer"></div>

<!-- LOGIN / REGISTER PAGE -->
<div id="loginPage">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Smart Canteen</h1>
      <p>Kantin Methodist Lubuk Pakam</p>
    </div>
    <div class="auth-tabs">
      <button class="tab-btn active" onclick="showAuthForm('login')">Masuk</button>
      <button class="tab-btn" onclick="showAuthForm('register')">Daftar</button>
    </div>
    <form id="loginForm" class="auth-form" onsubmit="event.preventDefault(); handleLogin();">
      <div class="input-group"><label>Nama Lengkap</label><input type="text" id="loginNama" placeholder="Masukkan nama" required></div>
      <div class="input-group"><label>Password</label><input type="password" id="loginPass" placeholder="Password" required></div>
      <button type="submit" class="btn-main">Masuk</button>
      <button type="button" class="btn-admin-trigger" onclick="toggleAdminLogin()">Login sebagai Admin</button>
      <div id="adminField" class="hidden" style="margin-top:15px;"><div class="input-group"><label>Password Admin</label><input type="password" id="adminPass" placeholder="Password Khusus Admin"></div></div>
    </form>
    <form id="registerForm" class="auth-form hidden" onsubmit="event.preventDefault(); handleRegister();">
      <div class="input-group"><label>Nama Lengkap</label><input type="text" id="regNama" placeholder="Nama unik" required></div>
      <div class="input-group"><label>Email</label><input type="email" id="regEmail" placeholder="Email aktif" required></div>
      <div class="input-group"><label>Password</label><input type="password" id="regPass" placeholder="Buat password" required></div>
      <div class="input-group"><label>Status</label><select id="regStatus" onchange="toggleKelas()"><option value="Siswa">Siswa</option><option value="Guru">Guru</option></select></div>
      <div class="input-group" id="kelasField"><label>Kelas</label><input type="text" id="regKelas" placeholder="Contoh: XII IPA 1"></div>
      <button type="submit" class="btn-main">Daftar Sekarang</button>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainPage" class="hidden container">
  
  <button class="cart-fab hidden" id="cartIcon" onclick="openCart()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="m1 1 4 4 2.68 12.24a2 2 0 0 0 2 1.76h9.72a2 2 0 0 0 2-1.76L23 6H6"/></svg>
    <span class="cart-count hidden" id="cartCount">0</span>
  </button>

  <div class="app-header">
    <h1 class="app-title">Smart Canteen</h1>
    <p class="app-subtitle">Kantin Methodist Lubuk Pakam</p>
  </div>

  <div class="profile-bar" onclick="openProfile()">
    <div class="profile-info"><h4 id="displayName">Nama</h4><p id="displayRole">Role</p></div>
    <div class="profile-badge" id="displayBadge">User</div>
  </div>

  <!-- CONTENT SECTIONS -->
  <div id="menuSection">
    <div class="sub-nav"><button class="active" onclick="setFilter('makanan')">Makanan</button><button onclick="setFilter('minuman')">Minuman</button></div>
    <div class="grid" id="menuGrid"></div>
  </div>
  <div id="activeOrdersSection" class="hidden"><h3 style="margin-bottom:15px;">Pesanan Saya</h3><div id="activeOrdersList"></div></div>
  <div id="historySection" class="hidden"><h3 style="margin-bottom:15px;">Riwayat</h3><div id="historyList"></div></div>
  <div id="adminOrdersSection" class="hidden">
     <div class="admin-tabs"><button class="admin-tab-btn active" onclick="switchAdminTab('orders')">Pesanan Masuk</button><button class="admin-tab-btn" onclick="switchAdminTab('menu')">Kelola Menu</button></div>
     <div id="adminOrdersContent"></div>
     <div id="adminMenuContent" class="hidden"></div>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <nav class="nav-bar" id="mainNavBar">
    <button class="nav-item active" id="navMenu" onclick="navigate('menu')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span>Menu</span></button>
    <button class="nav-item" id="navActive" onclick="navigate('active')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg><span>Pesanan Saya</span><div class="nav-notif hidden" id="navNotifUser">0</div></button>
    <button class="nav-item" id="navHistory" onclick="navigate('history')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg><span>Riwayat</span></button>
    <button class="nav-item hidden" id="navAdminOrders" onclick="navigate('adminOrders')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg><span>Pesanan</span><div class="nav-notif hidden" id="navNotifAdmin">0</div></button>
    <button class="nav-item hidden" id="navAdminMenu" onclick="navigate('adminMenu')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span>Menu</span></button>
  </nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWwiJSAIezQtJDNVv3ANWECr6BM2XtNFo",
  authDomain: "methodist-smart-canteen.firebaseapp.com",
  databaseURL: "https://methodist-smart-canteen-default-rtdb.firebaseio.com",
  projectId: "methodist-smart-canteen",
  storageBucket: "methodist-smart-canteen.firebasestorage.app",
  messagingSenderId: "37702426363",
  appId: "1:37702426363:web:cbf58be7e8d31bda461a5e",
  measurementId: "G-L2Q5Y7B8Y6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = null; let cart = []; let menuData = []; let allOrders = []; let filter = 'makanan';
let editingMenuId = null; // Variable untuk state edit

window.showToast = function(msg, type = 'success') {
  const el = document.createElement('div'); el.className = `toast toast-${type}`; el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

window.showAuthForm = function(type) {

window.handleRegister = async function() {

  if(!nama || !email || !pass) return showToast('Lengkapi form', 'error');
  const snapshot = await get(ref(db, `users/${nama}`)); if(snapshot.exists()) return showToast('Nama sudah digunakan!', 'error');
  await set(ref(db, `users/${nama}`), { email, pass, status, kelas, nama });

window.handleLogin = async function() {
  const nama = document.getElementById('loginNama').value.trim(); const pass = document.getElementById('loginPass').value; const adminPass = document.getElementById('adminPass').value;
  const isAdminVisible = !document.getElementById('adminField').classList.contains('hidden');
  if(isAdminVisible) { if(adminPass === "01042009") { currentUser = { nama: "Admin", isAdmin: true }; localStorage.setItem('sc_user', JSON.stringify(currentUser)); startApp(); } else { showToast('Password Admin salah', 'error'); } return; }
  const snapshot = await get(ref(db, `users/${nama}`)); if(!snapshot.exists()) return showToast('Nama tidak ditemukan', 'error');
  const user = snapshot.val(); if(user.pass !== pass) return showToast('Password salah', 'error');
  currentUser = { nama: user.nama, status: user.status, kelas: user.kelas, email: user.email }; localStorage.setItem('sc_user', JSON.stringify(currentUser)); startApp();

function startApp() {
  document.getElementById('loginPage').classList.add('hidden'); document.getElementById('mainPage').classList.remove('hidden');
  document.getElementById('navMenu').classList.add('hidden'); document.getElementById('navActive').classList.add('hidden'); document.getElementById('navHistory').classList.add('hidden'); document.getElementById('navAdminOrders').classList.add('hidden'); document.getElementById('navAdminMenu').classList.add('hidden');

    document.getElementById('cartIcon').classList.add('hidden');

window.navigate = function(tab) {
  ['menuSection', 'activeOrdersSection', 'historySection', 'adminOrdersSection'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if(tab === 'menu') { document.getElementById('menuSection').classList.remove('hidden'); document.getElementById('navMenu').classList.add('active'); renderMenu(); }
  else if(tab === 'active') { document.getElementById('activeOrdersSection').classList.remove('hidden'); document.getElementById('navActive').classList.add('active'); renderActiveOrders(); }
  else if(tab === 'history') { document.getElementById('historySection').classList.remove('hidden'); document.getElementById('navHistory').classList.add('active'); renderHistory(); }
  else if(tab === 'adminOrders') { document.getElementById('adminOrdersSection').classList.remove('hidden'); document.getElementById('navAdminOrders').classList.add('active'); switchAdminTab('orders'); }
  else if(tab === 'adminMenu') { document.getElementById('adminOrdersSection').classList.remove('hidden'); document.getElementById('navAdminMenu').classList.add('active'); switchAdminTab('menu'); }
}
window.setFilter = function(type) { filter = type; document.querySelectorAll('.sub-nav button').forEach(b => b.classList.remove('active')); if(type === 'makanan') document.querySelectorAll('.sub-nav button')[0].classList.add('active'); else document.querySelectorAll('.sub-nav button')[1].classList.add('active'); renderMenu(); }

function initMenu() {
  onValue(ref(db, 'menu'), snap => {
    if(!snap.exists()) { const def = [{id:1, name:"Rice Bowl", harga:15000, img:"https://i.ibb.co.com/v4R5PPKd/ricebowl.jpg", type:"makanan", available:true, desc:"Nasi dengan lauk pilihan seimbang.", ratingCount:0, ratingSum:0}, {id:2, name:"Spaghetti", harga:12000, img:"https://i.ibb.co.com/bjftf3gK/mie.jpg", type:"makanan", available:true, desc:"Pasta Italia dengan saus tomat.", ratingCount:0, ratingSum:0}, {id:3, name:"Es Teh Manis", harga:5000, img:"https://i.ibb.co.com/8PqkBXz/esteh.jpg", type:"minuman", available:true, desc:"Teh manis dingin segar.", ratingCount:0, ratingSum:0}]; set(ref(db, 'menu'), def); menuData = def; }
    else { menuData = Object.values(snap.val()); } renderMenu();

// ================= RENDER MENU WITH STARS =================
function renderMenu() { 
  const g = document.getElementById('menuGrid'); 
  const filtered = menuData.filter(m => m.type === filter); 
  g.innerHTML = filtered.map(m => {
    const sum = m.ratingSum || 0;
    const count = m.ratingCount || 0;
    const avg = count > 0 ? (sum / count) : 0;
    
    let starsHtml = '';
    if (count > 0) {
      starsHtml = '<div class="menu-rating">';
      for(let i=1; i<=5; i++) { starsHtml += `<span class="${i <= Math.round(avg) ? 'star-filled' : 'star-empty'}">★</span>`; }
      starsHtml += `<span class="rating-text">(${avg.toFixed(1)})</span></div>`;
    }

    return `
      <div class="menu-card" onclick="openDetail(${m.id})">
        ${!m.available ? `<div class="menu-badge badge-unavailable">Habis</div>` : ''}
        <img src="${m.img}" class="menu-img" onerror="this.src='https://via.placeholder.com/150'">
        <div class="menu-body">
          <div class="menu-name">${m.name}</div>
          <div class="menu-price">Rp ${m.harga.toLocaleString()}</div>
          ${starsHtml}
        </div>
      </div>
    `;
  }).join(''); 
}

window.openDetail = function(id) { 
  const m = menuData.find(x => x.id === id); if(!m) return; 
  const canOrder = m.available && !currentUser.isAdmin; 
  const sum = m.ratingSum || 0; const count = m.ratingCount || 0; const avg = count > 0 ? (sum / count) : 0;
  let ratingHtml = '';
  if (count > 0) {
     ratingHtml = '<div style="display:flex; justify-content:center; gap:2px; margin-bottom:10px;">';
     for(let i=1; i<=5; i++) { ratingHtml += `<span style="color:${i <= Math.round(avg) ? 'var(--secondary)' : '#ccc'}; font-size:18px;">★</span>`; }
     ratingHtml += `<span style="margin-left:5px; color:var(--muted); font-size:12px; font-weight:700;">${avg.toFixed(1)} / 5</span></div>`;
  }
  const html = `
    <div style="position:relative;">
      <img src="${m.img}" style="width:100%; height:150px; object-fit:cover; border-radius:16px; margin-bottom:15px;">
      <h2 style="font-size:20px;">${m.name}</h2>
      <p style="color:var(--muted); font-size:14px; margin:5px 0 10px;">${m.desc}</p>
      ${ratingHtml}
      <div style="font-size:18px; font-weight:800; margin-bottom:15px; background:linear-gradient(45deg, var(--primary), var(--tertiary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Rp ${m.harga.toLocaleString()}</div>
      <div style="display:flex; gap:10px;">
        <button onclick="addToCart(${id})" class="btn-main" style="flex:1; padding:12px;" ${!canOrder ? 'disabled style="opacity:0.5"' : ''}>Tambah</button>
        <button onclick="orderNow(${id})" class="btn-main" style="flex:1; padding:12px; background:linear-gradient(135deg, var(--secondary), var(--tertiary));" ${!canOrder ? 'disabled style="opacity:0.5"' : ''}>Pesan</button>
      </div>
    </div>`; 
  openModal(html); 
}

// ================= REALTIME ORDERS =================
function initOrders() {
  const ordersRef = ref(db, 'orders');
  onValue(ordersRef, (snapshot) => {
    const data = snapshot.val();
    const newOrders = data ? Object.values(data) : [];
    if (currentUser && !currentUser.isAdmin && allOrders.length > 0) {
       const myOldOrders = allOrders.filter(o => o.user === currentUser.nama);
       const myNewOrders = newOrders.filter(o => o.user === currentUser.nama);
       myNewOrders.forEach(newO => {
          const oldO = myOldOrders.find(o => o.id === newO.id);
          if (oldO && oldO.status !== newO.status) {
             let msg = '';
             if (newO.status === 'processing') msg = 'Pesanan sedang diproses...';
             else if (newO.status === 'ready') msg = 'Pesanan Selesai! Silakan ambil.';
             else if (newO.status === 'completed') msg = 'Pesanan telah diambil.';
             else if (newO.status === 'cancelled') msg = 'Pesanan dibatalkan.';
             if (msg) showToast(msg, 'info');
          }
       });
    }
    allOrders = newOrders;
    if (!document.getElementById('activeOrdersSection').classList.contains('hidden')) renderActiveOrders();
    if (!document.getElementById('historySection').classList.contains('hidden')) renderHistory();
    if (!document.getElementById('adminOrdersContent').classList.contains('hidden')) renderAdminOrders();
    updateNotifCount();
  });
}

function updateNotifCount() { 
  if(currentUser.isAdmin) { 
    const count = allOrders.filter(o => ['pending', 'processing', 'ready'].includes(o.status)).length; 
    const el = document.getElementById('navNotifAdmin'); 
    if(count > 0) { el.textContent = count; el.classList.remove('hidden'); } else el.classList.add('hidden'); 
  } else { 
    const count = allOrders.filter(o => o.user === currentUser.nama && !['completed', 'cancelled'].includes(o.status)).length; 
    const el = document.getElementById('navNotifUser'); 
    if(count > 0) { el.textContent = count; el.classList.remove('hidden'); } else el.classList.add('hidden'); 
  } 
}

window.addToCart = function(id) { const m = menuData.find(x => x.id === id); if(!m || !m.available) return; const exist = cart.find(c => c.id === id); if(exist) exist.qty++; else cart.push({id, qty:1, name:m.name, price:m.harga}); updateCartBadge(); showToast('Ditambahkan', 'success'); closeModal(); }
function updateCartBadge() { const count = cart.reduce((a,b) => a+b.qty, 0); const el = document.getElementById('cartCount'); if(count > 0) { el.textContent = count; el.classList.remove('hidden'); } else el.classList.add('hidden'); }
window.openCart = function() { if(cart.length === 0) return showToast('Keranjang kosong', 'warning'); let total = 0; const items = cart.map(c => { total += c.price * c.qty; return `<div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px;"><span>${c.name} x${c.qty}</span><span>Rp ${(c.price*c.qty).toLocaleString()}</span></div>`; }).join(''); const html = `<h2 style="margin-bottom:15px;">Keranjang</h2>${items}<div style="text-align:right; font-weight:800; margin:15px 0; font-size:18px; background:linear-gradient(45deg, var(--primary), var(--tertiary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Total: Rp ${total.toLocaleString()}</div><input type="text" id="orderNote" placeholder="Catatan (opsional)" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px;"><button onclick="placeOrder()" class="btn-main">Pesan Sekarang</button>`; openModal(html); }
window.orderNow = function(id) { const m = menuData.find(x => x.id === id); if(!m) return; cart = [{id, qty:1, name:m.name, price:m.harga}]; openCart(); }
window.placeOrder = function() { if(cart.length === 0) return; let total = 0; const items = cart.map(c => { total += c.price * c.qty; return {menuId: c.id, name: c.name, qty: c.qty, price: c.price}; }); const note = document.getElementById('orderNote').value; const order = { id: Date.now(), user: currentUser.nama, userIdentity: `${currentUser.nama} (${currentUser.status}${currentUser.status==='Siswa' ? ' - '+currentUser.kelas : ''})`, items, total, note, status: 'pending', rating: 0, time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}), date: new Date().toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'short'}) }; set(ref(db, 'orders/' + order.id), order); cart = []; updateCartBadge(); closeModal(); showToast('Pesanan berhasil dikirim!', 'success'); }

function renderActiveOrders() { const list = document.getElementById('activeOrdersList'); const mine = allOrders.filter(o => o.user === currentUser.nama && !['completed', 'cancelled'].includes(o.status)).reverse(); if(mine.length === 0) return list.innerHTML = '<p style="text-align:center; color:var(--muted); padding:40px 20px; background:white; border-radius:20px;">Tidak ada pesanan aktif.</p>'; list.innerHTML = mine.map(o => `<div class="order-card status-${o.status}"><div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span style="font-weight:700;">${o.date} - ${o.time}</span><span class="status-chip chip-${o.status}">${o.status}</span></div><div style="font-size:13px; color:#555;">${o.items.map(i => i.name+' x'+i.qty).join(', ')}</div>${o.note ? `<div style="font-size:12px; color:var(--secondary); font-style:italic; margin-top:5px;">Note: ${o.note}</div>` : ''}<div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;"><span style="font-weight:700; background:linear-gradient(45deg, var(--primary), var(--tertiary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Rp ${o.total.toLocaleString()}</span><div>${o.status === 'pending' ? `<button class="btn-action-sm btn-cancel" onclick="cancelOrder(${o.id})">Batalkan</button>` : ''}${o.status === 'ready' ? `<button class="btn-action-sm btn-accept" onclick="acceptOrder(${o.id})">Terima</button>` : ''}</div></div></div>`).join(''); }
function renderHistory() { const list = document.getElementById('historyList'); const mine = allOrders.filter(o => o.user === currentUser.nama && ['completed', 'cancelled'].includes(o.status)).reverse(); if(mine.length === 0) return list.innerHTML = '<p style="text-align:center; color:var(--muted); padding:40px 20px; background:white; border-radius:20px;">Belum ada riwayat.</p>'; list.innerHTML = mine.map(o => `<div class="order-card status-${o.status}"><div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span style="font-weight:700;">${o.date} - ${o.time}</span><span class="status-chip chip-${o.status}">${o.status}</span></div><div style="font-size:13px; color:#555;">${o.items.map(i => i.name+' x'+i.qty).join(', ')}</div><div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;"><span style="font-weight:700; color:#888;">Rp ${o.total.toLocaleString()}</span>${o.rating ? `<div style="color:var(--secondary);">★ ${o.rating}</div>` : ''}</div></div>`).join(''); }
window.cancelOrder = function(id) { if(!confirm('Yakin batalkan?')) return; set(ref(db, `orders/${id}/status`), 'cancelled'); showToast('Dibatalkan', 'warning'); }
window.acceptOrder = function(id) { set(ref(db, `orders/${id}/status`), 'completed'); const html = `<div style="text-align:center;"><h2 style="margin-bottom:10px;">Berikan Rating</h2><p style="color:var(--muted); margin-bottom:20px;">Bagaimana makanannya?</p><div class="rating-stars">${[5,4,3,2,1].map(i => `<input type="radio" id="s${i}" name="r" value="${i}" onclick="rate(${id}, ${i})"><label for="s${i}">★</label>`).join('')}</div></div>`; openModal(html); }

window.rate = function(oid, val) { 
  const order = allOrders.find(o => o.id === oid); if(!order) return; 
  set(ref(db, `orders/${oid}/rating`), val);
  order.items.forEach(it => { 
    const m = menuData.find(x => x.id === it.menuId); 
    if(m) { 
      const currentSum = m.ratingSum || 0; const currentCount = m.ratingCount || 0;
      set(ref(db, `menu/${m.id}/ratingSum`), currentSum + val); 
      set(ref(db, `menu/${m.id}/ratingCount`), currentCount + 1); 
    } 
  }); 
  closeModal(); showToast('Terima kasih!', 'success'); 
}

  document.getElementById('mPrice').value = "";

  document.getElementById('mImg').value = "";

window.saveMenu = function() { 
  const id = document.getElementById('editMenuId').value;
  const name = document.getElementById('mName').value; 
  const harga = parseInt(document.getElementById('mPrice').value); 
  const type = document.getElementById('mType').value; 
  const img = document.getElementById('mImg').value; 
  
  if(!name || !harga) return showToast('Isi nama & harga', 'warning'); 

  if(id) {
    // Update existing
    const m = menuData.find(x => x.id === parseInt(id));
    if(m) {
      // Preserve rating and availability
      set(ref(db, `menu/${id}`), { 
        id: parseInt(id), name, harga, type, img: img || 'https://via.placeholder.com/150', 
        desc: m.desc || '', 
        available: m.available, 
        ratingSum: m.ratingSum || 0, 
        ratingCount: m.ratingCount || 0 
      });
      showToast('Menu diupdate!', 'success');
      cancelEdit();
    }
  } else {
    // Add new
    const newId = Date.now();
    set(ref(db, `menu/${newId}`), {id: newId, name, harga, type, img: img || 'https://via.placeholder.com/150', available:true, desc:'', ratingSum:0, ratingCount:0}); 
    showToast('Menu ditambahkan', 'success'); 
  }
  // Clear form handled by cancelEdit for update case, manually for new:
  if(!id) {
     document.getElementById('mName').value = ""; document.getElementById('mPrice').value = ""; document.getElementById('mImg').value = "";
  }
}

window.toggleAvail = function(id) { const m = menuData.find(x => x.id === id); if(m) { set(ref(db, `menu/${id}/available`), !m.available); showToast('Status diubah', 'success'); } }
window.delMenu = function(id) { if(confirm('Hapus menu?')) { remove(ref(db, `menu/${id}`)); showToast('Terhapus', 'success'); } }

window.openProfile = function() { const html = `<div style="text-align:center;"><h2 style="margin-bottom:5px; background:linear-gradient(45deg, var(--primary), var(--tertiary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">${currentUser.nama}</h2><p style="color:var(--muted); margin-bottom:20px;">${currentUser.email || 'admin@canteen.com'}</p><button onclick="logout()" class="btn-main" style="background:var(--danger);">Keluar</button></div>`; openModal(html); }

function openModal(html) { const m = document.createElement('div'); m.className='modal'; m.id='modal'; m.innerHTML = `<div class="modal-content"><button class="btn-close" onclick="closeModal()">✕</button>${html}</div>`; document.body.appendChild(m); m.onclick = e => { if(e.target === m) closeModal(); }; }
window.closeModal = function() { document.getElementById('modal')?.remove(); }

const saved = localStorage.getItem('sc_user');
if(saved) { currentUser = JSON.parse(saved); startApp(); }

</script>
</body>
</html>
